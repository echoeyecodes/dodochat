name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  verify:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: "bun"
          cache-dependency-path: server/bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run formatting check
        run: bun run format:check

      - name: Run linting
        run: bun run lint

      - name: Run tests
        run: bun run test
